name: Run tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v4

      - name: install NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: install node dependencies
        run: npm ci
        
      - name: run tests
        run: npm test
